name: CI/CD Security & Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Principio de menor privilegio para el GITHUB_TOKEN
permissions:
  contents: read

jobs:
  security-and-build:
    name: Build & Security Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install dependencies
        # npm ci es más seguro y rápido para CI que npm install
        run: npm ci

      - name: Security Audit (Dependencias)
        # Falla el pipeline si hay vulnerabilidades 'high' o 'critical'
        run: npm audit --audit-level=high

      - name: Verificar Build (Astro)
        # Asegura que el proyecto compile correctamente antes de que Vercel lo despliegue
        run: npm run build
